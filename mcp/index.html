<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Codebase Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Transparent body so it integrates seamlessly into the chat panel */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ececec;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        /* A sleek, dark-mode card design */
        .panel {
            background: #1e1e24;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
        }
        .header {
            background: linear-gradient(180deg, #2a2a35 0%, #22222b 100%);
            padding: 14px 18px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }
        .header svg { margin-right: 10px; width: 18px; height: 18px; fill: #4daafc; }
        .badge {
            margin-left: auto;
            background: rgba(77, 170, 252, 0.2);
            color: #4daafc;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 450px;
            overflow-y: auto;
            font-size: 13px;
        }
        .file-item {
            padding: 10px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            transition: background 0.15s ease;
            cursor: default;
        }
        .file-item:last-child { border-bottom: none; }
        .file-item:hover { background: rgba(255, 255, 255, 0.05); }
        
        /* Modern VS-Code like file styling */
        .file-icon { margin-right: 12px; font-size: 16px; opacity: 0.8; }
        .file-info { display: flex; flex-direction: column; overflow: hidden; }
        .file-name { color: #ffffff; font-weight: 500; font-size: 14px; margin-bottom: 2px; }
        .file-path { color: #8b8b99; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Minimalist scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; border: 2px solid #1e1e24; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
            Project Directory
            <span class="badge" id="fileCount">0 Files</span>
        </div>
        <ul class="file-list" id="fileList">
            <!-- Files injected by MCP Server -->
        </ul>
    </div>

    <script>
        // In a real MCP App, the server injects this JSON string before serving.
        // For local development fallback, we use an empty array.
        let filesData = [];
        try {
            // {{FILES_JSON}} is replaced dynamically by mcp_server.py
            filesData = JSON.parse(`{{FILES_JSON}}`);
        } catch(e) {
            filesData = []; 
        }
        
        const list = document.getElementById('fileList');
        const countBadge = document.getElementById('fileCount');
        
        if (filesData && filesData.length > 0) {
            countBadge.textContent = `${filesData.length} Files`;
            filesData.forEach(path => {
                // Normalize slashes and extract filename and directory
                const parts = path.replace(/\\/g, '/').split('/');
                const fileName = parts.pop();
                const dirPath = parts.join('/') + '/';
                
                // Determine simple file icon based on extension
                let icon = "📄";
                if (fileName.endsWith('.py')) icon = "🐍";
                if (fileName.endsWith('.js') || fileName.endsWith('.json')) icon = "💛";
                if (fileName.endsWith('.html') || fileName.endsWith('.css')) icon = "🌐";
                if (fileName.endsWith('.md') || fileName.endsWith('.txt')) icon = "📝";

                const li = document.createElement('li');
                li.className = 'file-item';
                li.innerHTML = `
                    <div class="file-icon">${icon}</div>
                    <div class="file-info">
                        <span class="file-name">${fileName}</span>
                        <span class="file-path" title="${dirPath}">${dirPath}</span>
                    </div>
                `;
                list.appendChild(li);
            });
        } else {
            countBadge.style.display = 'none';
            list.innerHTML = `
                <li class="file-item" style="justify-content: center; padding: 30px;">
                    <span class="file-path">No files or fallback data injected. Run through MCP to see files!</span>
                </li>
            `;
        }
    </script>
</body>
</html>
